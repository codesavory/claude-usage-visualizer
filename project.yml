name: ClaudeUsageVisualizer
options:
  bundleIdPrefix: dev.claudeusagevisualizer
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

targets:
  ClaudeUsageVisualizer:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsageVisualizer
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.claudeusagevisualizer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ClaudeUsageVisualizer/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageVisualizer/Resources/ClaudeUsageVisualizer.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
